# fly.toml app configuration file generated for jeopi-collab-relay on 2026-07-08T12:10:20+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'jeopi-collab-relay'
primary_region = 'nrt'

[build]
  dockerfile = 'packages/collab-relay/Dockerfile'

[[mounts]]
  source = 'data'
  destination = '/data'

[env]
  RELAY_DATA_DIR = '/data'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
